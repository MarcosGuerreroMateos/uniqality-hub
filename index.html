<!DOCTYPE html>
<html lang="es" data-theme="green">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uniqality Hub - SOC</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="cyber-grid"></div>

    <div class="app-container">
        <section id="view-dashboard" class="view active">
            <header>
                <p class="subtitle">// UNIQALITY_PERIMETER</p>
                <h1 data-i18n="status_ok">TODO BAJO CONTROL</h1>
            </header>
            
            <div class="model-container" id="3d-canvas-container">
                <div class="scanline"></div>
                <div class="overlay-text">digital_twin / live / touch_to_rotate</div>
            </div>

            <div class="events-section">
                <div class="events-header">
                    <h3 data-i18n="live_events">EVENTOS EN VIVO</h3>
                    <span>conf: last 5m</span>
                </div>
                <div id="events-list">
                    </div>
            </div>
        </section>

        <section id="view-terminal" class="view">
            <header>
                <p class="subtitle">// SYSTEM_LOGS</p>
                <h1 data-i18n="nav_logs">Terminal</h1>
            </header>
            <div class="terminal-window">
                <div class="terminal-header">root@uniqality:~# tail -f /var/log/mail.log</div>
                <div id="terminal-output"></div>
            </div>
        </section>

        <section id="view-settings" class="view">
            <header>
                <p class="subtitle">// CONFIGURATION</p>
                <h1 data-i18n="nav_settings">Ajustes</h1>
            </header>
            <div class="settings-list">
                <div class="setting-item">
                    <span data-i18n="language">Idioma</span>
                    <select id="lang-select" onchange="app.changeLanguage(this.value)">
                        <option value="es">Español</option>
                        <option value="en">English</option>
                    </select>
                </div>
                <div class="setting-item">
                    <span data-i18n="theme_color">Color de Neón</span>
                    <div class="color-picker">
                        <button class="color-btn" style="background: #00ff99;" onclick="app.changeTheme('green')"></button>
                        <button class="color-btn" style="background: #00e5ff;" onclick="app.changeTheme('cyan')"></button>
                        <button class="color-btn" style="background: #ff00ff;" onclick="app.changeTheme('magenta')"></button>
                    </div>
                </div>
                <button class="danger-btn" onclick="app.clearCache()" data-i18n="clear_cache">Limpiar Caché Local</button>
            </div>
        </section>

        <nav class="bottom-nav">
            <button class="nav-btn active" onclick="app.switchTab('dashboard', this)">
                <span class="icon">⊞</span>
                <span data-i18n="nav_dashboard">Panel</span>
            </button>
            <button class="nav-btn" onclick="app.switchTab('terminal', this)">
                <span class="icon">⌨</span>
                <span data-i18n="nav_logs">Terminal</span>
            </button>
            <button class="nav-btn" onclick="app.switchTab('settings', this)">
                <span class="icon">⚙</span>
                <span data-i18n="nav_settings">Ajustes</span>
            </button>
        </nav>
    </div>

    <script src="app.js"></script>
</body>
</html>
